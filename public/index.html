<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brkovic Maritime Games</title>
  <meta name="description" content="Maritime training games. First module: Captain Ether." />
  <meta name="theme-color" content="#10243a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Brkovic Games" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="/" aria-label="Brkovic Maritime Games">
        <picture class="brand-picture">
          <source srcset="/assets/brand/logo-header-inline-light.webp" type="image/webp" />
          <img class="brand-logo" src="/assets/brand/logo-header-inline-light.png" alt="Vetus Nauta Brkovic" />
        </picture>
        <span class="brand-copy">
          <strong>Maritime Games</strong>
          <small>Sea Speak training</small>
        </span>
      </a>
      <div class="profile-area" id="profileArea"></div>
    </header>

    <main id="app" class="app-main" aria-live="polite"></main>
  </div>
  <script src="/assets/app.js" type="module"></script>
</body>
</html>
